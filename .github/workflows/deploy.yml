name: Build, Push and Deploy TicketApp

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t ticketapp:v1 .

      - name: Tag Docker Image
        run: |
          docker tag ticketapp:v1 \
          450681485034.dkr.ecr.us-east-2.amazonaws.com/ticketapp:v1

      - name: Push Docker Image
        run: |
          docker push \
          450681485034.dkr.ecr.us-east-2.amazonaws.com/ticketapp:v1

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 450681485034.dkr.ecr.us-east-2.amazonaws.com

            docker pull 450681485034.dkr.ecr.us-east-2.amazonaws.com/ticketapp:v1

            docker stop ticketapp || true
            docker rm ticketapp || true

            docker run -d --name ticketapp -p 5000:5000 \
            450681485034.dkr.ecr.us-east-2.amazonaws.com/ticketapp:v1
